<!DOCTYPE html>
<html>
<head>
    <title>Smart Stock AI</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
        }

        h1 {
            text-align: center;
            padding-top: 20px;
            font-size: 42px;
        }

        /* INPUT */
        .input-box {
            margin: 30px auto;
            width: 60%;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        input {
            padding: 14px;
            border-radius: 12px;
            border: none;
            width: 250px;
            text-transform: uppercase;
            background: #1e293b;
            color: white;
        }

        button {
            padding: 14px 30px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(90deg, #3b82f6, #06b6d4);
            color: white;
            cursor: pointer;
        }

        /* CARDS */
        .cards {
            display: flex;
            gap: 25px;
            justify-content: center;
            margin-top: 40px;
        }

        .card {
            width: 260px;
            padding: 25px;
            border-radius: 18px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            text-align: center;
        }

        .profit {
            border-top: 5px solid #22c55e;
        }

        .loss {
            border-top: 5px solid #ef4444;
        }

        .big {
            font-size: 30px;
            margin-top: 10px;
        }

        /* LOADER */
        #loader {
            display: none;
            text-align: center;
            margin-top: 30px;
        }

        .spinner {
            border: 6px solid #444;
            border-top: 6px solid #22c55e;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* GRAPHS */
        .graphs {
            display: flex;
            gap: 20px;
            margin: 50px;
        }

        .graph {
            width: 50%;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
        }
    </style>
</head>

<body>

<h1>🚀 Smart Stock AI</h1>

<div class="input-box">
    <input id="ticker" placeholder="RELIANCE">
    <input id="date" type="date">
    <button onclick="predict()">Predict</button>
</div>

<div id="loader">
    <div class="spinner"></div>
</div>

<div class="cards" id="cards"></div>

<div class="graphs">
    <div class="graph">
        <h3>📊 Full History</h3>
        <img id="graph1" width="100%">
    </div>

    <div class="graph">
        <h3>📈 Prediction Trend</h3>
        <img id="graph2" width="100%">
    </div>
</div>

<script>
async function predict() {

    const tickerInput = document.getElementById("ticker").value.toUpperCase();
    const ticker = tickerInput.endsWith(".NS") ? tickerInput : tickerInput + ".NS";
    const date = document.getElementById("date").value;

    const loader = document.getElementById("loader");
    const cards = document.getElementById("cards");

    loader.style.display = "block";
    cards.innerHTML = "";

    try {
        const res = await fetch(`/predict?ticker=${ticker}&date=${date}`);
        const data = await res.json();

        loader.style.display = "none";

        if (data.error) {
            cards.innerHTML = `<h3 style="color:red">${data.error}</h3>`;
            return;
        }

        const isProfit = data.predicted_return > 0;

        cards.innerHTML = `
            <div class="card ${isProfit ? 'profit' : 'loss'}">
                <h3>Signal</h3>
                <div class="big">${isProfit ? "BUY 📈" : "SELL 📉"}</div>
                <p>${(data.predicted_return * 100).toFixed(2)}%</p>
            </div>

            <div class="card">
                <h3>Current Price</h3>
                <div class="big">₹ ${data.current_price}</div>
            </div>

            <div class="card">
                <h3>Expected Price</h3>
                <div class="big">₹ ${data.expected_price}</div>
            </div>
        `;

        document.getElementById("graph1").src =
            "data:image/png;base64," + data.graphs.full_graph;

        document.getElementById("graph2").src =
            "data:image/png;base64," + data.graphs.recent_graph;

    } catch {
        loader.style.display = "none";
        cards.innerHTML = "<h3 style='color:red'>Server Error</h3>";
    }
}
</script>

</body>
</html>
